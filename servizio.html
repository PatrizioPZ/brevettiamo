<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrevettIAmo - Servizio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; color: #333; }
        .navbar { background: #1e3c72; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .navbar a { color: white; text-decoration: none; font-weight: 600; }
        .container { max-width: 800px; margin: 0 auto; padding: 30px; }
        .card { background: white; padding: 30px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #1e3c72; margin-bottom: 10px; }
        .prezzo { font-size: 2em; color: #2a5298; font-weight: 700; margin: 20px 0; }
        .prezzo span { font-size: 0.5em; color: #666; font-weight: 400; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #1e3c72; }
        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        textarea { min-height: 120px; resize: vertical; }
        .required label:after { content: " *"; color: #dc3545; }
        .btn { padding: 14px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: 600; }
        .btn-primary { background: #1e3c72; color: white; }
        .btn-primary:hover { background: #2a5298; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .error { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 5px; margin: 20px 0; }
        .success { background: #d4edda; color: #155724; padding: 15px; border-radius: 5px; margin: 20px 0; }
    </style>
  <link rel="stylesheet" href="chatbot.css">  
</head>
<body>

    <nav class="navbar">
        <a href="index.html">BrevettIAmo</a>
        <a href="index.html">Torna ai Servizi</a>
    </nav>

    <div class="container">
        <div id="messaggi"></div>
        
        <div id="loading" class="loading">Caricamento servizio...</div>
        
        <div id="servizio-container" style="display:none;">
            <div class="card">
                <h1 id="nome-servizio"></h1>
                <p id="descrizione-servizio" style="color:#666;"></p>
                <div class="prezzo">
                    EUR <span id="prezzo-servizio"></span>
                    <span>/ <span id="crediti-servizio"></span> crediti</span>
                </div>
                <p id="tempo-servizio" style="color:#999; font-size:14px;"></p>
            </div>

            <div class="card">
                <h2>Compila i dati</h2>
                <form id="form-dinamico"></form>
            </div>

            <div class="card">
                <h2>Pagamento</h2>
                <p>Riepilogo: <strong id="riepilogo-prezzo"></strong></p>
                <button class="btn btn-primary" onclick="procediPagamento()">Procedi al Pagamento</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://jtekrvlmqnluvaiapmwb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_p9WH85YPfwtaKp4tfcDwug_Q9duausk';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let servizioCorrente = null;
        let slug = new URLSearchParams(window.location.search).get('slug');

        async function caricaServizio() {
            if (!slug) {
                mostraErrore('Nessun servizio selezionato. Torna alla <a href="index.html">homepage</a>.');
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('servizi_singoli')
                    .select('*')
                    .eq('slug', slug)
                    .eq('stato', 'attivo')
                    .single();

                if (error) throw error;
                if (!data) throw new Error('Servizio non trovato');

                servizioCorrente = data;
                renderServizio(data);
                generaForm(data.campi_form);

            } catch (err) {
                mostraErrore('Errore: ' + err.message);
            }
        }

        function renderServizio(s) {
            document.getElementById('nome-servizio').textContent = s.nome;
            document.getElementById('descrizione-servizio').textContent = s.descrizione_completa || s.descrizione_breve || '';
            document.getElementById('prezzo-servizio').textContent = s.prezzo;
            document.getElementById('crediti-servizio').textContent = s.crediti;
            document.getElementById('tempo-servizio').textContent = 'Tempo elaborazione: ' + (s.tempo_elaborazione || 'N/D');
            document.getElementById('riepilogo-prezzo').textContent = 'EUR ' + s.prezzo + ' (' + s.crediti + ' crediti)';
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('servizio-container').style.display = 'block';
        }

        function generaForm(campiJson) {
            const form = document.getElementById('form-dinamico');
            let campi = [];
            
            try {
                campi = JSON.parse(campiJson || '[]');
            } catch (e) {
                campi = [];
            }

            let html = '';
            campi.forEach(campo => {
                const required = campo.required ? 'required' : '';
                const requiredClass = campo.required ? 'required' : '';
                
                html += `<div class="form-group ${requiredClass}">`;
                html += `<label for="${campo.id}">${campo.label}</label>`;
                
                if (campo.type === 'select') {
                    html += `<select id="${campo.id}" name="${campo.id}" ${required}>`;
                    html += `<option value="">Seleziona...</option>`;
                    campo.options.forEach(opt => {
                        html += `<option value="${opt}">${opt}</option>`;
                    });
                    html += `</select>`;
                } else if (campo.type === 'textarea') {
                    html += `<textarea id="${campo.id}" name="${campo.id}" placeholder="${campo.placeholder || ''}" rows="${campo.rows || 4}" ${required}></textarea>`;
                } else if (campo.type === 'number') {
                    html += `<input type="number" id="${campo.id}" name="${campo.id}" placeholder="${campo.placeholder || ''}" min="${campo.min || 0}" max="${campo.max || 999}" ${required}>`;
                } else if (campo.type === 'file') {
                    html += `<input type="file" id="${campo.id}" name="${campo.id}" accept="${campo.accept || '*'}" ${campo.multiple ? 'multiple' : ''} ${required}>`;
                } else {
                    html += `<input type="text" id="${campo.id}" name="${campo.id}" placeholder="${campo.placeholder || ''}" ${required}>`;
                }
                
                html += `</div>`;
            });

            html += `<button type="button" class="btn btn-primary" onclick="salvaDati()">Salva Dati</button>`;
            form.innerHTML = html;
        }

        function salvaDati() {
            const form = document.getElementById('form-dinamico');
            const formData = new FormData(form);
            const dati = {};
            
            for (let [key, value] of formData.entries()) {
                dati[key] = value;
            }
            
            localStorage.setItem('servizio_' + slug, JSON.stringify(dati));
            mostraSuccesso('Dati salvati! Procedi al pagamento.');
        }

        function procediPagamento() {
            if (!servizioCorrente) return;
            
            // Reindirizza a pagamento con parametri
            const params = new URLSearchParams({
                servizio: slug,
                prezzo: servizioCorrente.prezzo,
                crediti: servizioCorrente.crediti
            });
            
            window.location.href = 'pagamento.html?' + params.toString();
        }

        function mostraErrore(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('messaggi').innerHTML = '<div class="error">' + msg + '</div>';
        }

        function mostraSuccesso(msg) {
            document.getElementById('messaggi').innerHTML = '<div class="success">' + msg + '</div>';
            setTimeout(() => document.getElementById('messaggi').innerHTML = '', 3000);
        }

        document.addEventListener('DOMContentLoaded', caricaServizio);
    </script>
<script src="chatbot.js"></script>
    
</body>
</html>
