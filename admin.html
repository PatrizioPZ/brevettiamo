<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrevettIAmo - Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#f0f2f5; }
.navbar { background:#1e3c72; color:white; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
.navbar h1 { font-size:1.3em; }
.navbar a { color:white; text-decoration:none; margin-left:20px; }
.container { max-width:1400px; margin:0 auto; padding:20px; }
.alert { padding:15px; border-radius:5px; margin-bottom:15px; display:none; }
.alert.show { display:block; }
.alert-error { background:#f8d7da; color:#721c24; }
.alert-success { background:#d4edda; color:#155724; }
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin-bottom:20px; }
.stat-card { background:white; padding:20px; border-radius:10px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
.stat-number { font-size:2em; color:#1e3c72; font-weight:bold; }
.stat-label { color:#666; font-size:0.9em; }
.filters { background:white; padding:15px; border-radius:10px; margin-bottom:20px; display:flex; gap:10px; flex-wrap:wrap; }
.filters input, .filters select { padding:10px; border:1px solid #ddd; border-radius:5px; }
.filters input { flex:1; min-width:200px; }
.table-container { background:white; border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
.table-header { background:#1e3c72; color:white; padding:15px 20px; font-weight:bold; }
table { width:100%; border-collapse:collapse; }
th { background:#f8f9fa; padding:12px; text-align:left; font-weight:bold; color:#555; font-size:0.85em; text-transform:uppercase; }
td { padding:12px; border-bottom:1px solid #eee; font-size:0.9em; }
tr:hover { background:#f8f9fa; }
.status { padding:4px 12px; border-radius:15px; font-size:0.8em; font-weight:bold; display:inline-block; }
.status-nuova { background:#d1ecf1; color:#0c5460; }
.status-bozza { background:#fff3cd; color:#856404; }
.status-lavorazione { background:#cce5ff; color:#004085; }
.status-depositata { background:#d4edda; color:#155724; }
.status-concessa { background:#d1ecf1; color:#0c5460; }
.status-rifiutata { background:#f8d7da; color:#721c24; }
.btn-action { background:#e9ecef; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:0.85em; margin-right:5px; }
.btn-action:hover { background:#dee2e6; }
.btn-status { padding:5px 10px; border:1px solid #ddd; border-radius:5px; cursor:pointer; font-size:0.8em; background:white; }
.btn-status:hover { border-color:#1e3c72; }
.empty { text-align:center; padding:50px; color:#666; }
.loading { text-align:center; padding:50px; }
.spinner { width:40px; height:40px; border:3px solid #eee; border-top-color:#1e3c72; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 15px; }
@keyframes spin { to { transform:rotate(360deg); } }
.admin-badge { background:#dc3545; color:white; padding:3px 10px; border-radius:10px; font-size:0.75em; margin-left:10px; }
@media (max-width:768px) { .stats-grid { grid-template-columns:repeat(2,1fr); } }
@media (max-width:480px) { .stats-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<<nav class="navbar">
<h1>BrevettIAmo - Admin Panel <span class="admin-badge">ADMIN</span></h1>
<div>
<a href="dashboard.html">Dashboard</a>
<a href="nuova-pratica.html">Nuova Pratica</a>
<a href="index.html">Home</a>
</div>
</nav>

<div class="container">
<div class="alert alert-error" id="errorAlert"></div>
<div class="alert alert-success" id="successAlert"></div>

<div class="stats-grid">
<div class="stat-card"><div class="stat-number" id="statTotale">0</div><div class="stat-label">Totale Pratiche</div></div>
<div class="stat-card"><div class="stat-number" id="statNuove">0</div><div class="stat-label">Nuove</div></div>
<div class="stat-card"><div class="stat-number" id="statInLavorazione">0</div><div class="stat-label">In Lavorazione</div></div>
<div class="stat-card"><div class="stat-number" id="statConcluse">0</div><div class="stat-label">Concluse</div></div>
</div>

<div class="filters">
<input type="text" id="searchInput" placeholder="Cerca per titolo, inventore..." onkeyup="filtraPratiche()">
<select id="filterTipo" onchange="filtraPratiche()">
<option value="">Tutti i tipi</option>
<option value="invenzione">Invenzione</option>
<option value="modello_utilita">Modello Utilita</option>
<option value="design">Design</option>
<option value="marchi">Marchio</option>
<option value="software">Software</option>
<option value="altro">Altro</option>
</select>
<select id="filterStato" onchange="filtraPratiche()">
<option value="">Tutti gli stati</option>
<option value="nuova">Nuova</option>
<option value="bozza">In Bozza</option>
<option value="lavorazione">In Lavorazione</option>
<option value="depositata">Depositate</option>
<option value="concessa">Concessa</option>
<option value="rifiutata">Rifiutata</option>
</select>
<select id="filterSettore" onchange="filtraPratiche()">
<option value="">Tutti i settori</option>
<option value="meccanica">Meccanica</option>
<option value="elettronica">Elettronica</option>
<option value="informatica">Informatica</option>
<option value="chimica">Chimica</option>
<option value="biotecnologie">Biotecnologie</option>
<option value="energia">Energia</option>
<option value="edilizia">Edilizia</option>
<option value="agroalimentare">Agroalimentare</option>
<option value="altro">Altro</option>
</select>
</div>

<div class="table-container">
<div class="table-header">Gestione Pratiche (<span id="praticheCount">caricamento...</span>)</div>
<div id="tableContent">
<div class="loading">
<div class="spinner"></div>
<p>Caricamento pratiche...</p>
</div>
</div>
</div>
</div>

<script>
var SUPABASE_URL = 'https://jtekrvlmqnluvaiapmwb.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_p9WH85YPfwtaKp4tfcDwug_Q9duausk';
var supabaseClient = null;
var tuttePratiche = [];

function initSupabase() {
try {
if (window.supabase && window.supabase.createClient) {
supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
console.log('Supabase ok');
caricaPratiche();
return true;
} else {
showError('Errore connessione server');
return false;
}
} catch (err) {
showError('Errore: ' + err.message);
return false;
}
}

setTimeout(initSupabase, 500);

async function caricaPratiche() {
if (!supabaseClient) return;
try {
console.log('Carico pratiche...');
var result = await supabaseClient.from('pratiche').select('*').order('created_at', {ascending:false});
if (result.error) throw result.error;
tuttePratiche = result.data || [];
console.log('Pratiche caricate: ' + tuttePratiche.length);
aggiornaStatistiche();
renderTabella(tuttePratiche);
} catch (err) {
console.error('Errore:', err);
showError('Errore caricamento: ' + err.message);
document.getElementById('tableContent').innerHTML = '<div class="empty"><h3>Errore caricamento</h3><p>' + escapeHtml(err.message) + '</p></div>';
}
}

function aggiornaStatistiche() {
var totale = tuttePratiche.length;
var nuove = 0;
var inLavorazione = 0;
var concluse = 0;
for (var i = 0; i < tuttePratiche.length; i++) {
var p = tuttePratiche[i];
if (p.status === 'nuova' || p.status === 'bozza') nuove++;
if (p.status === 'lavorazione' || p.status === 'depositata') inLavorazione++;
if (p.status === 'concessa' || p.status === 'rifiutata') concluse++;
}
document.getElementById('statTotale').textContent = totale;
document.getElementById('statNuove').textContent = nuove;
document.getElementById('statInLavorazione').textContent = inLavorazione;
document.getElementById('statConcluse').textContent = concluse;
}

function renderTabella(pratiche) {
var container = document.getElementById('tableContent');
document.getElementById('praticheCount').textContent = pratiche.length;

if (pratiche.length === 0) {
container.innerHTML = '<div class="empty"><h3>Nessuna pratica trovata</h3></div>';
return;
}

var tipoLabels = {
'invenzione': 'Invenzione',
'modello_utilita': 'Modello Utilita',
'design': 'Design',
'marchi': 'Marchio',
'software': 'Software',
'altro': 'Altro'
};

var statusLabels = {
'nuova': 'Nuova',
'bozza': 'In Bozza',
'lavorazione': 'In Lavorazione',
'depositata': 'Depositate',
'concessa': 'Concessa',
'rifiutata': 'Rifiutata'
};

var statusClasses = {
'nuova': 'status-nuova',
'bozza': 'status-bozza',
'lavorazione': 'status-lavorazione',
'depositata': 'status-depositata',
'concessa': 'status-concessa',
'rifiutata': 'status-rifiutata'
};

var settoreLabels = {
'meccanica': 'Meccanica',
'elettronica': 'Elettronica',
'informatica': 'Informatica',
'chimica': 'Chimica',
'biotecnologie': 'Biotecnologie',
'energia': 'Energia',
'edilizia': 'Edilizia',
'agroalimentare': 'Agroalimentare',
'altro': 'Altro'
};

var html = '<table><thead><tr><th>ID</th><th>Titolo</th><th>Tipo</th><th>Settore</th><th>Inventore</th><th>Titolare</th><th>Stato</th><th>Data</th><th>Azioni</th></tr></thead><tbody>';

for (var i = 0; i < pratiche.length; i++) {
var p = pratiche[i];
var idShort = p.id ? p.id.substring(0,8) + '...' : '-';
var titolo = escapeHtml(p.titolo || '-');
var tipo = tipoLabels[p.tipo_brevetto] || p.tipo_brevetto || '-';
var settore = settoreLabels[p.settore] || p.settore || '-';
var inventore = escapeHtml(p.inventore || '-');
var titolare = escapeHtml(p.titolare || '-');
var statusClass = statusClasses[p.status] || 'status-nuova';
var statusLabel = statusLabels[p.status] || p.status || 'Nuova';
var data = formatData(p.created_at);

html += '<tr>';
html += '<td><code style="font-size:0.8em;color:#666;">' + idShort + '</code></td>';
html += '<td><strong>' + titolo + '</strong></td>';
html += '<td>' + tipo + '</td>';
html += '<td>' + settore + '</td>';
html += '<td>' + inventore + '</td>';
html += '<td>' + titolare + '</td>';
html += '<td><span class="status ' + statusClass + '">' + statusLabel + '</span></td>';
html += '<td>' + data + '</td>';
html += '<td>';
html += '<button class="btn-action" onclick="vediDettaglio(' + "'" + p.id + "'" + ')">Vedi</button>';
html += '<button class="btn-action" onclick="cambiaStato(' + "'" + p.id + "'" + ',' + "'" + 'bozza' + "'" + ')">Bozza</button>';
html += '<button class="btn-action" onclick="cambiaStato(' + "'" + p.id + "'" + ',' + "'" + 'lavorazione' + "'" + ')">Lavora</button>';
html += '<button class="btn-action" onclick="cambiaStato(' + "'" + p.id + "'" + ',' + "'" + 'depositata' + "'" + ')">Deposita</button>';
html += '<button class="btn-action" onclick="cambiaStato(' + "'" + p.id + "'" + ',' + "'" + 'concessa' + "'" + ')">Concedi</button>';
html += '<button class="btn-action" onclick="cambiaStato(' + "'" + p.id + "'" + ',' + "'" + 'rifiutata' + "'" + ')">Rifiuta</button>';
html += '</td>';
html += '</tr>';
}

html += '</tbody></table>';
container.innerHTML = html;
}

async function cambiaStato(id, nuovoStato) {
if (!supabaseClient) return;
if (!confirm('Confermi cambio stato in ' + getStatusLabel(nuovoStato) + '?')) return;

try {
var result = await supabaseClient.from('pratiche').update({status: nuovoStato}).eq('id', id).select();
if (result.error) throw result.error;
showSuccess('Stato aggiornato!');
caricaPratiche();
} catch (err) {
console.error('Errore:', err);
showError('Errore aggiornamento: ' + err.message);
}
}

function vediDettaglio(id) {
window.location.href = 'dettaglio.html?id=' + id;
}

function filtraPratiche() {
var search = document.getElementById('searchInput').value.toLowerCase().trim();
var tipo = document.getElementById('filterTipo').value;
var stato = document.getElementById('filterStato').value;
var settore = document.getElementById('filterSettore').value;

var filtrate = [];
for (var i = 0; i < tuttePratiche.length; i++) {
var p = tuttePratiche[i];
var include = true;

if (search) {
var match = false;
if (p.titolo && p.titolo.toLowerCase().indexOf(search) !== -1) match = true;
if (p.inventore && p.inventore.toLowerCase().indexOf(search) !== -1) match = true;
if (p.titolare && p.titolare.toLowerCase().indexOf(search) !== -1) match = true;
if (!match) include = false;
}

if (tipo && p.tipo_brevetto !== tipo) include = false;
if (stato && p.status !== stato) include = false;
if (settore && p.settore !== settore) include = false;

if (include) filtrate.push(p);
}

renderTabella(filtrate);
}

function getStatusLabel(stato) {
var labels = {
'nuova': 'Nuova',
'bozza': 'In Bozza',
'lavorazione': 'In Lavorazione',
'depositata': 'Depositate',
'concessa': 'Concessa',
'rifiutata': 'Rifiutata'
};
return labels[stato] || stato;
}

function escapeHtml(text) {
if (!text) return '';
var div = document.createElement('div');
div.textContent = text;
return div.innerHTML;
}

function formatData(isoDate) {
if (!isoDate) return '-';
var d = new Date(isoDate);
return d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
}

function showError(msg) {
var alert = document.getElementById('errorAlert');
alert.textContent = msg;
alert.classList.add('show');
setTimeout(function() { alert.classList.remove('show'); }, 8000);
}

function showSuccess(msg) {
var alert = document.getElementById('successAlert');
alert.textContent = msg;
alert.classList.add('show');
setTimeout(function() { alert.classList.remove('show'); }, 5000);
}
</script>
</body>
</html>
