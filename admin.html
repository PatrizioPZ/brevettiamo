<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrevettIAmo - Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#f0f2f5; }
.navbar { background:#1e3c72; color:white; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
.container { max-width:1000px; margin:0 auto; padding:20px; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; }
h2 { color:#1e3c72; margin-bottom:15px; }
table { width:100%; border-collapse:collapse; }
th { background:#f8f9fa; padding:10px; text-align:left; }
td { padding:10px; border-bottom:1px solid #eee; }
input { width:80px; padding:5px; border:1px solid #ddd; border-radius:3px; }
button { padding:8px 15px; border:none; border-radius:5px; cursor:pointer; }
.btn-verde { background:#28a745; color:white; }
.btn-verde:hover { background:#218838; }
.btn-rosso { background:#dc3545; color:white; }
.btn-rosso:hover { background:#c82333; }
.btn-salva { background:#1e3c72; color:white; padding:10px 20px; margin-top:15px; }
.alert { padding:15px; border-radius:5px; margin-bottom:15px; display:none; }
.alert.show { display:block; }
.alert-success { background:#d4edda; color:#155724; }
.alert-error { background:#f8d7da; color:#721c24; }
.loading { text-align:center; padding:20px; color:#666; }
</style>
</head>
<body>

<<nav class="navbar">
<h1>BrevettIAmo - Admin Panel</h1>
</nav>

<div class="container">
<div class="alert alert-success" id="successAlert"></div>
<div class="alert alert-error" id="errorAlert"></div>

<div class="card">
<h2>Servizi Singoli (da Supabase)</h2>
<div class="loading" id="loading">Caricamento servizi...</div>
<table id="tabellaServizi" style="display:none;">
<<thead>
<tr><th>Servizio</th><th>Slug</th><th>Prezzo (EUR)</th><th>Crediti</th><th>Stato</th><th>Azioni</th></tr>
</thead>
<tbody id="prezziSingoli"></tbody>
</table>
<button class="btn-salva" onclick="salvaPrezzi()" style="display:none;" id="btnSalva">Salva Modifiche</button>
</div>

<div class="card">
<h2>Prezzi Abbonamenti</h2>
<table>
<<thead>
<tr><th>Piano</th><th>Prezzo Mensile (EUR)</th><th>Servizi/Mese</th></tr>
</thead>
<tbody id="prezziAbbonamenti"></tbody>
</table>
<button class="btn-salva" onclick="salvaAbbonamenti()">Salva Abbonamenti</button>
</div>

<div class="card">
<h2>Configurazione AI</h2>
<p>Modello attuale: <strong id="modelloAI">meta-llama/llama-3.1-8b-instruct</strong></p>
<p>Stato: <strong id="statoAI">Attivo</strong></p>
</div>
</div>

<script>
var SUPABASE_URL = 'https://jtekrvlmqnluvaiapmwb.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0ZWtydmxtcW5sdXZhaWFwbXdvYiIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzQ4NTI0MTYwLCJleHAiOjIwNjQxMDAxNjB9.29fa46e3aab68e41aa5db78806976e3fd68b45ae4956715333e975060e789cac';
var supabaseClient = null;
var serviziCorrenti = [];

var abbonamentiDefault = [
  { id: 'starter', name: 'Starter', prezzo: 29, servizi: 10 },
  { id: 'pro', name: 'Pro', prezzo: 99, servizi: 50 },
  { id: 'enterprise', name: 'Enterprise', prezzo: 299, servizi: 999 }
];

function init() {
  if (window.supabase && window.supabase.createClient) {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    caricaServiziSupabase();
    caricaAbbonamenti();
  } else {
    showError('Errore connessione Supabase');
  }
}

setTimeout(init, 500);

async function caricaServiziSupabase() {
  try {
    var { data, error } = await supabaseClient
      .from('servizi_singoli')
      .select('*')
      .order('ordine');
    
    if (error) throw error;
    
    if (!data || data.length === 0) {
      document.getElementById('loading').textContent = 'Nessun servizio trovato. Verifica tabella servizi_singoli.';
      return;
    }
    
    serviziCorrenti = data;
    renderTabella(data);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('tabellaServizi').style.display = 'table';
    document.getElementById('btnSalva').style.display = 'inline-block';
    
  } catch (err) {
    document.getElementById('loading').textContent = 'Errore: ' + err.message;
    showError('Errore caricamento: ' + err.message);
  }
}

function renderTabella(data) {
  var html = '';
  for (var i = 0; i < data.length; i++) {
    var s = data[i];
    var btnClass = s.stato === 'attivo' ? 'btn-verde' : 'btn-rosso';
    var btnText = s.stato === 'attivo' ? 'Attivo' : 'Disattivato';
    html += '<tr>';
    html += '<td>' + s.nome + '</td>';
    html += '<td><code>' + s.slug + '</code></td>';
    html += '<td><input type="number" id="prezzo_' + s.id + '" value="' + s.prezzo + '" min="0" step="0.01"></td>';
    html += '<td><input type="number" id="crediti_' + s.id + '" value="' + s.crediti + '" min="0"></td>';
    html += '<td><button class="' + btnClass + '" id="btn_' + s.id + '" onclick="toggleStato(\'' + s.id + '\', \'' + s.stato + '\')">' + btnText + '</button></td>';
    html += '<td><button onclick="salvaSingolo(\'' + s.id + '\')">Salva</button></td>';
    html += '</tr>';
  }
  document.getElementById('prezziSingoli').innerHTML = html;
}

async function toggleStato(id, statoAttuale) {
  var nuovoStato = statoAttuale === 'attivo' ? 'disattivo' : 'attivo';
  
  try {
    var { error } = await supabaseClient
      .from('servizi_singoli')
      .update({ stato: nuovoStato })
      .eq('id', id);
    
    if (error) throw error;
    
    showSuccess('Stato aggiornato: ' + nuovoStato);
    caricaServiziSupabase();
    
  } catch (err) {
    showError('Errore: ' + err.message);
  }
}

async function salvaSingolo(id) {
  var prezzo = parseFloat(document.getElementById('prezzo_' + id).value) || 0;
  var crediti = parseInt(document.getElementById('crediti_' + id).value) || 1;
  
  try {
    var { error } = await supabaseClient
      .from('servizi_singoli')
      .update({ prezzo: prezzo, crediti: crediti })
      .eq('id', id);
    
    if (error) throw error;
    
    showSuccess('Servizio salvato!');
    
  } catch (err) {
    showError('Errore salvataggio: ' + err.message);
  }
}

function salvaPrezzi() {
  salvaSingolo(serviziCorrenti[0].id);
  showSuccess('Salvataggio in corso...');
}

function caricaAbbonamenti() {
  var html = '';
  for (var j = 0; j < abbonamentiDefault.length; j++) {
    var a = abbonamentiDefault[j];
    html += '<tr>';
    html += '<td>' + a.name + '</td>';
    html += '<td><input type="number" id="abb_prezzo_' + a.id + '" value="' + a.prezzo + '"></td>';
    html += '<td><input type="number" id="abb_servizi_' + a.id + '" value="' + a.servizi + '"></td>';
    html += '</tr>';
  }
  document.getElementById('prezziAbbonamenti').innerHTML = html;
}

function salvaAbbonamenti() {
  var abbonamenti = [];
  for (var j = 0; j < abbonamentiDefault.length; j++) {
    var a = abbonamentiDefault[j];
    abbonamenti.push({
      id: a.id,
      prezzo: parseInt(document.getElementById('abb_prezzo_' + a.id).value),
      servizi: parseInt(document.getElementById('abb_servizi_' + a.id).value)
    });
  }
  
  if (supabaseClient) {
    supabaseClient.from('config_prezzi').upsert({ id: 'abbonamenti', dati: abbonamenti }).then(function() {
      showSuccess('Abbonamenti salvati su Supabase');
    }).catch(function(err) {
      showError('Errore: ' + err.message);
    });
  }
}

function showSuccess(msg) {
  var alert = document.getElementById('successAlert');
  alert.textContent = msg;
  alert.classList.add('show');
  setTimeout(function() { alert.classList.remove('show'); }, 3000);
}

function showError(msg) {
  var alert = document.getElementById('errorAlert');
  alert.textContent = msg;
  alert.classList.add('show');
  setTimeout(function() { alert.classList.remove('show'); }, 5000);
}
</script>

</body>
</html>
