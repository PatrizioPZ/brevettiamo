<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Assistenza - BrevettIAmo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center}
.chat-widget{position:fixed;bottom:20px;right:20px;z-index:1000}
.chat-toggle{width:60px;height:60px;border-radius:50%;background:#2563eb;color:#fff;border:none;box-shadow:0 4px 20px rgba(37,99,235,0.3);cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
.chat-toggle:hover{background:#1d4ed8;transform:scale(1.05)}
.chat-window{width:380px;height:600px;background:#fff;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.15);display:none;flex-direction:column;overflow:hidden;position:fixed;bottom:90px;right:20px;z-index:1001}
.chat-window.active{display:flex}
.chat-header{background:#2563eb;color:#fff;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.chat-header h6{margin:0;font-weight:600;font-size:1rem}
.chat-header .status{display:flex;align-items:center;gap:.5rem;font-size:.8rem;opacity:.9}
.chat-header .status-dot{width:8px;height:8px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.chat-header .btn-close{color:#fff;opacity:.8;background:none;border:none;font-size:1.2rem;cursor:pointer}
.chat-header .btn-close:hover{opacity:1}
.chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.75rem}
.message{max-width:85%;padding:.75rem 1rem;border-radius:16px;font-size:.9rem;line-height:1.4;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.message.user{align-self:flex-end;background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.message.bot{align-self:flex-start;background:#f1f5f9;color:#1e293b;border-bottom-left-radius:4px}
.message.bot.typing{background:#f8fafc;color:#64748b;font-style:italic}
.message-time{font-size:.7rem;opacity:.7;margin-top:.25rem;text-align:right}
.chat-input{padding:1rem;border-top:1px solid #e2e8f0;display:flex;gap:.5rem;align-items:center}
.chat-input input{flex:1;padding:.75rem 1rem;border:2px solid #e2e8f0;border-radius:12px;font-size:.9rem;outline:none;transition:border-color .2s}
.chat-input input:focus{border-color:#2563eb}
.chat-input button{width:40px;height:40px;border-radius:12px;background:#2563eb;color:#fff;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.chat-input button:hover{background:#1d4ed8}
.chat-input button:disabled{background:#cbd5e1;cursor:not-allowed}
.quick-replies{display:flex;gap:.5rem;padding:0 1rem .5rem;flex-wrap:wrap}
.quick-reply{padding:.375rem .75rem;border-radius:20px;border:1px solid #e2e8f0;background:#fff;color:#2563eb;font-size:.8rem;cursor:pointer;transition:all .2s}
.quick-reply:hover{background:#eff6ff;border-color:#2563eb}
.welcome-msg{text-align:center;padding:1rem;color:#64748b;font-size:.85rem}
.welcome-msg i{font-size:2rem;color:#2563eb;margin-bottom:.5rem;display:block}
</style>
</head>
<body>

<div class="chat-widget">
<button class="chat-toggle" onclick="toggleChat()" id="chatToggle">
<i class="bi bi-chat-dots"></i>
</button>
<div class="chat-window" id="chatWindow">
<div class="chat-header">
<div>
<h6><i class="bi bi-robot me-2"></i>BrevettIAmo AI</h6>
<div class="status"><span class="status-dot"></span>Online</div>
</div>
<button class="btn-close" onclick="toggleChat()"><i class="bi bi-x-lg"></i></button>
</div>
<div class="chat-messages" id="chatMessages">
<div class="welcome-msg">
<i class="bi bi-shield-check"></i>
<p>Ciao! Sono l'assistente AI di BrevettIAmo.<br>Posso aiutarti con brevetti, marchi, design e ricerche anteriorita.</p>
</div>
</div>
<div class="quick-replies" id="quickReplies">
<button class="quick-reply" onclick="sendQuickReply('Quanto costa un brevetto?')">Prezzi</button>
<button class="quick-reply" onclick="sendQuickReply('Come funziona?')">Procedura</button>
<button class="quick-reply" onclick="sendQuickReply('Servizi disponibili')">Servizi</button>
<button class="quick-reply" onclick="sendQuickReply('Tempi di consegna')">Tempi</button>
</div>
<div class="chat-input">
<input type="text" id="chatInput" placeholder="Scrivi un messaggio..." onkeypress="if(event.key==='Enter')sendMessage()">
<button onclick="sendMessage()" id="sendBtn"><i class="bi bi-send"></i></button>
</div>
</div>
</div>

<script>
const SUPABASE_URL='https://jtekrvlmqnluvaiapmwb.supabase.co';
const SUPABASE_KEY='sb_publishable_p9WH85YPfwtaKp4tfcDwug_Q9duausk';
const sbClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let chatHistory=[];
let userId=null;

async function initChat(){
  const{data:{session}}=await sbClient.auth.getSession();
  if(session){
    userId=session.user.id;
    await loadChatHistory();
  }
}

async function loadChatHistory(){
  if(!userId)return;
  try{
    const{data}=await sbClient.from('chat_messages').select('*').eq('user_id',userId).order('created_at',{ascending:true}).limit(50);
    if(data&&data.length>0){
      const msgs=document.getElementById('chatMessages');
      msgs.innerHTML='';
      data.forEach(m=>addMessage(m.content,m.is_user,false));
    }
  }catch(e){console.error('Errore caricamento chat:',e)}
}

function toggleChat(){
  const win=document.getElementById('chatWindow');
  const btn=document.getElementById('chatToggle');
  win.classList.toggle('active');
  if(win.classList.contains('active')){
    btn.innerHTML='<i class="bi bi-x-lg"></i>';
    document.getElementById('chatInput').focus();
  }else{
    btn.innerHTML='<i class="bi bi-chat-dots"></i>';
  }
}

function addMessage(text,isUser,save=true){
  const msgs=document.getElementById('chatMessages');
  const div=document.createElement('div');
  div.className='message '+(isUser?'user':'bot');
  div.innerHTML=text+'<div class="message-time">'+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})+'</div>';
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  if(save)chatHistory.push({text,isUser,time:new Date().toISOString()});
}

function showTyping(){
  const msgs=document.getElementById('chatMessages');
  const div=document.createElement('div');
  div.className='message bot typing';
  div.id='typingIndicator';
  div.innerHTML='<i class="bi bi-three-dots"></i> Sto scrivendo...';
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function hideTyping(){
  const el=document.getElementById('typingIndicator');
  if(el)el.remove();
}

function sendQuickReply(text){
  document.getElementById('chatInput').value=text;
  sendMessage();
}

async function sendMessage(){
  const input=document.getElementById('chatInput');
  const btn=document.getElementById('sendBtn');
  const text=input.value.trim();
  if(!text)return;

  input.value='';
  btn.disabled=true;
  addMessage(text,true);
  showTyping();

  try{
    const response=await getAIResponse(text);
    hideTyping();
    addMessage(response,false);

    if(userId){
      await sbClient.from('chat_messages').insert([
        {user_id:userId,content:text,is_user:true},
        {user_id:userId,content:response,is_user:false}
      ]);
    }
  }catch(e){
    hideTyping();
    addMessage('Mi dispiace, ho avuto un problema tecnico. Riprova tra poco.',false);
    console.error('Errore chat:',e);
  }

  btn.disabled=false;
  input.focus();
}

async function getAIResponse(userMessage){
  const lower=userMessage.toLowerCase();

  // Risposte predefinite per FAQ comuni
  if(lower.includes('prezz')||lower.includes('cost')||lower.includes('quanto')){
    return 'I prezzi partono da 29 EUR per il pacchetto Starter. I servizi singoli partono da 19 EUR. Visita la pagina <a href="prezzi.html">Prezzi</a> per il listino completo.';
  }
  if(lower.includes('procedur')||lower.includes('come funziona')||lower.includes('funziona')){
    return 'E semplice: 1) Scegli il servizio, 2) Descrivi la tua invenzione, 3) L AI prepara i documenti, 4) Tu li revisioni, 5) Depositi tramite UIBM o con nostra assistenza. Tempo medio: 24-48 ore per la preparazione.';
  }
  if(lower.includes('serviz')||lower.includes('offert')){
    return 'Offriamo: Ricerca Anteriorita (19 EUR), Redazione Descrizione Tecnica (49 EUR), Deposito Brevetto UIBM (99 EUR), Ricerca Marchi (29 EUR), Design e Modelli (39 EUR), Consulenza Strategica (59 EUR). Tutti i servizi sono AI-assisted con revisione umana.';
  }
  if(lower.includes('temp')||lower.includes('quando')||lower.includes('veloc')){
    return 'Tempi standard: Ricerca anteriorita 2-4 ore, Redazione documenti 24-48 ore, Deposito UIBM 1-3 giorni lavorativi. I tempi possono variare in base alla complessita della pratica.';
  }
  if(lower.includes('brevett')||lower.includes('invenzion')){
    return 'Un brevetto protegge la tua invenzione per 20 anni. Offriamo assistenza completa: dalla ricerca anteriorita alla redazione della descrizione tecnica fino al deposito UIBM. Il pacchetto completo parte da 99 EUR.';
  }
  if(lower.includes('marchio')||lower.includes('logo')||lower.includes('brand')){
    return 'La ricerca marchi verifica se il tuo nome/logo e gia registrato. Costa 29 EUR e include report dettagliato. Il deposito marchio UIBM e incluso nel pacchetto Pro (99 EUR).';
  }
  if(lower.includes('design')||lower.includes('modello')){
    return 'Il design industriale protegge l aspetto estetico di un prodotto per 25 anni. Offriamo ricerca e deposito a partire da 39 EUR.';
  }
  if(lower.includes('ai')||lower.includes('intelligenza')||lower.includes('artificiale')){
    return 'Usiamo AI avanzata per analizzare milioni di documenti brevettuali in pochi minuti. L AI redige bozze professionali che vengono poi revisionate da esperti. Qualita garantita: 80% AI, 20% umano.';
  }
  if(lower.includes('uman')||lower.includes('espert')||lower.includes('revis')){
    return 'Ogni documento AI viene revisionato da un esperto brevettuale prima della consegna. Non sei soddisfatto? Offriamo 2 revisioni gratuite incluse nel prezzo.';
  }
  if(lower.includes('pagament')||lower.includes('carta')||lower.includes('paypal')){
    return 'Accettiamo carte di credito, PayPal, bonifico bancario. I pagamenti sono gestiti in modo sicuro tramite LemonSqueezy. Fattura sempre inclusa.';
  }
  if(lower.includes('nd')||lower.includes('riservatezz')||lower.includes('privacy')){
    return 'La riservatezza e garantita da NDA digitale. I tuoi dati sono criptati e non condivisi con terzi. Leggi la nostra <a href="modulo_privacy_nda.html">Privacy Policy e NDA</a>.';
  }
  if(lower.includes('ciao')||lower.includes('salve')||lower.includes('buongiorno')){
    return 'Ciao! Sono l assistente AI di BrevettIAmo. Come posso aiutarti oggi? Puoi chiedermi informazioni su prezzi, servizi, tempi o procedura.';
  }
  if(lower.includes('grazi')||lower.includes('thank')){
    return 'Prego! Se hai altre domande, sono qui. Oppure puoi creare una pratica direttamente dal <a href="dashboard.html">Dashboard</a>.';
  }
  if(lower.includes('login')||lower.includes('acced')||lower.includes('registr')){
    return 'Puoi accedere con Google, Apple o email/password. Clicca su Accedi in alto a destra. Se non hai un account, la registrazione e gratuita e richiede solo 30 secondi.';
  }

  // Risposta generica per domande non riconosciute
  return 'Interessante domanda! Per una risposta piu dettagliata ti consiglio di: 1) Consultare la <a href="index.html">homepage</a> per i servizi, 2) Visitare la pagina <a href="prezzi.html">Prezzi</a>, o 3) Creare una pratica dal <a href="dashboard.html">Dashboard</a> per assistenza personalizzata.';
}

// Inizializza chat all avvio
document.addEventListener('DOMContentLoaded',initChat);
</script>
</body>
</html>
