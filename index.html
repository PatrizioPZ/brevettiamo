<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrevettIAmo — Accedi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, #1a3a5c 0%, #0d1b2a 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #1a1a2e; 
        }
        .login-card { 
            background: white; 
            border-radius: 16px; 
            padding: 2.5rem; 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
        }
        .logo { 
            text-align: center; 
            margin-bottom: 2rem; 
        }
        .logo h1 { 
            font-size: 1.8rem; 
            color: #1a3a5c; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 0.5rem; 
        }
        .logo p { 
            color: #6b7280; 
            margin-top: 0.5rem; 
            font-size: 0.95rem; 
        }
        .form-group { 
            margin-bottom: 1.25rem; 
        }
        .form-group label { 
            display: block; 
            margin-bottom: 0.5rem; 
            font-weight: 600; 
            color: #374151; 
            font-size: 0.9rem; 
        }
        .form-group input { 
            width: 100%; 
            padding: 0.75rem 1rem; 
            border: 1px solid #d1d5db; 
            border-radius: 8px; 
            font-size: 1rem; 
            transition: all 0.2s; 
        }
        .form-group input:focus { 
            outline: none; 
            border-color: #1a3a5c; 
            box-shadow: 0 0 0 3px rgba(26,58,92,0.1); 
        }
        .btn-login { 
            width: 100%; 
            background: #1a3a5c; 
            color: white; 
            border: none; 
            padding: 0.875rem; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s; 
            margin-top: 0.5rem; 
        }
        .btn-login:hover { 
            background: #0d1b2a; 
        }
        .btn-login:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
        }
        .divider { 
            text-align: center; 
            margin: 1.5rem 0; 
            color: #9ca3af; 
            font-size: 0.9rem; 
            position: relative; 
        }
        .divider::before, 
        .divider::after { 
            content: ''; 
            position: absolute; 
            top: 50%; 
            width: 35%; 
            height: 1px; 
            background: #e5e7eb; 
        }
        .divider::before { 
            left: 0; 
        }
        .divider::after { 
            right: 0; 
        }
        .btn-magic { 
            width: 100%; 
            background: white; 
            color: #1a3a5c; 
            border: 2px solid #1a3a5c; 
            padding: 0.75rem; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s; 
        }
        .btn-magic:hover { 
            background: #f8fafc; 
        }
        .links { 
            text-align: center; 
            margin-top: 1.5rem; 
            font-size: 0.9rem; 
            color: #6b7280; 
        }
        .links a { 
            color: #1a3a5c; 
            text-decoration: none; 
            font-weight: 600; 
        }
        .links a:hover { 
            text-decoration: underline; 
        }
        .alert { 
            padding: 0.875rem 1rem; 
            border-radius: 8px; 
            margin-bottom: 1rem; 
            font-size: 0.9rem; 
            display: none; 
        }
        .alert.show { 
            display: block; 
        }
        .alert-success { 
            background: #d1fae5; 
            color: #065f46; 
            border: 1px solid #a7f3d0; 
        }
        .alert-error { 
            background: #fee2e2; 
            color: #991b1b; 
            border: 1px solid #fecaca; 
        }
        .spinner { 
            display: inline-block; 
            width: 16px; 
            height: 16px; 
            border: 2px solid #ffffff; 
            border-top-color: transparent; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
            margin-left: 8px; 
            vertical-align: middle; 
        }
        @keyframes spin { 
            to { 
                transform: rotate(360deg); 
            } 
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>📋 BrevettIAmo</h1>
            <p>Piattaforma per la gestione brevetti</p>
        </div>

        <div class="alert" id="alert"></div>

        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="tua@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="La tua password" required>
            </div>
            <button type="button" class="btn-login" id="btnLogin" onclick="accedi()">
                Accedi
            </button>
        </form>

        <div class="divider">oppure</div>

        <button class="btn-magic" id="btnMagic" onclick="inviaMagicLink()">
            🔮 Accedi con Magic Link
        </button>

        <div class="links">
            <p>Non hai un account? <a href="#" onclick="mostraRegistrazione()">Registrati</a></p>
            <p style="margin-top:0.5rem;"><a href="#" onclick="recuperaPassword()">Password dimenticata?</a></p>
        </div>
    </div>

    <script>
        // Verifica se l'utente è già loggato
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                if (typeof supabase === 'undefined' || !supabase) {
                    mostraAlert('Errore: Supabase non disponibile', 'error');
                    return;
                }
                
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    // Già loggato, vai al dashboard
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                console.error('Errore verifica sessione:', err);
            }
        });

        async function accedi() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            if (!email || !password) {
                mostraAlert('Inserisci email e password', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'Accesso in corso... <span class="spinner"></span>';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                mostraAlert('Accesso effettuato! Reindirizzamento...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (err) {
                mostraAlert('Errore: ' + err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = 'Accedi';
            }
        }

        async function inviaMagicLink() {
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('btnMagic');

            if (!email) {
                mostraAlert('Inserisci la tua email', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'Invio in corso... <span class="spinner"></span>';

            try {
                const { error } = await supabase.auth.signInWithOtp({
                    email: email,
                    options: {
                        emailRedirectTo: CONFIG.SITE_URL + '/dashboard.html'
                    }
                });

                if (error) throw error;

                mostraAlert('Magic Link inviato! Controlla la tua email.', 'success');
                btn.innerHTML = '✅ Inviato!';

            } catch (err) {
                mostraAlert('Errore: ' + err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '🔮 Accedi con Magic Link';
            }
        }

        async function mostraRegistrazione() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                mostraAlert('Inserisci email e password per registrarti', 'error');
                return;
            }

            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        emailRedirectTo: CONFIG.SITE_URL + '/dashboard.html'
                    }
                });

                if (error) throw error;

                mostraAlert('Registrazione completata! Controlla la tua email per confermare.', 'success');

            } catch (err) {
                mostraAlert('Errore: ' + err.message, 'error');
            }
        }

        async function recuperaPassword() {
            const email = document.getElementById('email').value.trim();

            if (!email) {
                mostraAlert('Inserisci la tua email', 'error');
                return;
            }

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: CONFIG.SITE_URL + '/reset-password.html'
                });

                if (error) throw error;

                mostraAlert('Email di recupero inviata!', 'success');

            } catch (err) {
                mostraAlert('Errore: ' + err.message, 'error');
            }
        }

        function mostraAlert(messaggio, tipo) {
            const alert = document.getElementById('alert');
            alert.textContent = messaggio;
            alert.className = 'alert alert-' + tipo + ' show';
            
            if (tipo === 'success') {
                setTimeout(() => {
                    alert.classList.remove('show');
                }, 5000);
            }
        }

        // Invio form con Enter
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                accedi();
            }
        });
    </script>
</body>
</html>
